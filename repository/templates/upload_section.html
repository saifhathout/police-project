{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ section_name }} - إضافة بيانات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #00105e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .header h1 {
            color: #1e3c72;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
        }
        
        .checkbox-group input {
            width: auto;
            margin-left: 10px;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-submit {
            flex: 1;
            background: #1e3c72;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-cancel {
            flex: 1;
            background: #6c757d;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }
        
        .btn-cancel:hover {
            background: #5a6268;
        }
        
        .messages {
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 768px) {
            .form-card {
                padding: 20px;
            }
            
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="header">
                <h1>{{ section_icon }} {{ section_name }}</h1>
                <p>يرجى إدخال البيانات كاملة</p>
            </div>
            
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="alert alert-{% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_name">الاسم الكامل</label>
                    <input type="text" name="name" id="id_name" class="form-control" placeholder="أدخل الاسم الكامل" required>
                </div>

                <div class="form-group">
                    <label for="id_age">العمر</label>
                    <input type="number" name="age" id="id_age" class="form-control" placeholder="أدخل العمر" required>
                </div>

                <div class="form-group">
                    <label for="id_address">العنوان</label>
                    <input type="text" name="address" id="id_address" class="form-control" placeholder="أدخل العنوان">
                </div>

                <div class="form-group">
                    <label for="id_case_number">رقم القضية</label>
                    <input type="text" name="case_number" id="id_case_number" class="form-control" placeholder="أدخل رقم القضية">
                </div>

                <div class="form-group">
                    <label for="id_case_type">نوع القضية</label>
                    <input type="text" name="case_type" id="id_case_type" class="form-control" placeholder="أدخل نوع القضية">
                </div>

                <div class="form-group">
                    <label for="id_date_sessions">تاريخ الجلسات</label>
                    <input type="date" name="date_sessions" id="id_date_sessions" class="form-control">
                </div>

                <div class="form-group">
                    <label for="id_paper">الأوراق الخاصة بالمتهم (PDF)</label>
                    <input type="file" name="paper" id="id_paper" class="form-control" accept=".pdf,.doc,.docx">
                    <small style="color: #666; display: block; margin-top: 5px;">(ملفات PDF, DOC, DOCX)</small>
                </div>

                <div class="form-group">
                    <label for="id_picture">الصورة الشخصية</label>
                    <input type="file" name="picture" id="id_picture" class="form-control" accept="image/*">
                </div>
                
                <div class="buttons">
                    <button type="submit" class="btn-submit">✅ حفظ البيانات</button>
                    <a href="{% url 'second_page' %}" class="btn-cancel">❌ إلغاء</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
